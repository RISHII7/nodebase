name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Biome Lint
        run: npm run lint

      # Requires build to generate prisma client for type check
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        # run: tsc --noEmit (Skipping if no direct script, using build instead to verify types)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # Dummy or real secret required for build if strict
          SKIP_ENV_VALIDATION: true # If using t3-env or similar to skip validation during build
          # Providing a dummy URL if validation is strict and SKIP_ENV_VALIDATION isn't enough
          DATABASE_URL_UNPOOLED: "postgresql://user:password@localhost:5432/db" 

